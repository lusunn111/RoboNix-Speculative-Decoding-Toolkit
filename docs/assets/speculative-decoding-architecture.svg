<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Speculative Decoding Toolkit architecture</title>
  <desc id="desc">Offline Drafter preparation and online candidate generation, target-model verification, acceptance, and fallback.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/><stop offset="1" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="candidate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2d7ff9"/><stop offset="1" stop-color="#24c7d9"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#102342" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2d7ff9"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#159a72"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d98b18"/></marker>
    <style>
      .title{font-family:Arial,sans-serif;font-size:34px;font-weight:700;fill:#12213d}.subtitle{font-family:Arial,sans-serif;font-size:17px;font-weight:500;fill:#66738a}
      .section{font-family:Arial,sans-serif;font-size:18px;font-weight:700;letter-spacing:1.5px}.node{font-family:Arial,sans-serif;font-size:17px;font-weight:650;fill:#15233e;text-anchor:middle}
      .small{font-family:Arial,sans-serif;font-size:14px;font-weight:500;fill:#68758c;text-anchor:middle}.pill{font-family:Arial,sans-serif;font-size:15px;font-weight:650;text-anchor:middle}
    </style>
  </defs>
  <rect width="1600" height="720" rx="30" fill="url(#background)"/>
  <text x="70" y="64" class="title">Speculative Decoding Toolkit</text>
  <text x="70" y="96" class="subtitle">Train a lightweight Drafter once · Propose fast · Verify safely · Fall back when uncertain</text>

  <rect x="55" y="135" width="1490" height="175" rx="24" fill="#ffffff" stroke="#d5e6fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="85" y="174" class="section" fill="#3572b8">OFFLINE DRAFTER PREPARATION</text>
  <g fill="#edf6ff" stroke="#9bc6f5" stroke-width="2">
    <rect x="95" y="205" width="225" height="70" rx="16"/><rect x="420" y="205" width="225" height="70" rx="16"/>
    <rect x="745" y="205" width="225" height="70" rx="16"/><rect x="1070" y="205" width="225" height="70" rx="16"/>
  </g>
  <text x="207" y="247" class="node">Robot Data</text><text x="532" y="247" class="node">Sample Builder</text>
  <text x="857" y="247" class="node">Drafter Training</text><text x="1182" y="247" class="node">Drafter Checkpoint</text>
  <path d="M320 240H410M645 240H735M970 240H1060" fill="none" stroke="#2d7ff9" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="1350" y="205" width="145" height="70" rx="35" fill="#dbeaff"/><text x="1422" y="246" class="pill" fill="#1e63b2">Reusable Asset</text>
  <path d="M1295 240H1340" fill="none" stroke="#2d7ff9" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="55" y="345" width="1490" height="315" rx="24" fill="#ffffff" stroke="#d5e6fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="85" y="385" class="section" fill="#3572b8">ONLINE SPECULATIVE EXECUTION</text>
  <g fill="#f7fbff" stroke="#9bc6f5" stroke-width="2">
    <rect x="85" y="435" width="220" height="82" rx="17"/><rect x="390" y="435" width="205" height="82" rx="17"/>
    <rect x="700" y="435" width="240" height="82" rx="17"/><rect x="1045" y="435" width="220" height="82" rx="17"/>
  </g>
  <text x="195" y="482" class="node">Observation + Task</text>
  <text x="492" y="482" class="node">Drafter Proposal</text>
  <text x="820" y="482" class="node">Candidate Tree</text>
  <text x="1155" y="482" class="node">Target VLA Verifier</text>
  <path d="M305 476H380M595 476H690M940 476H1035" fill="none" stroke="#2d7ff9" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M610 445C650 410 675 420 710 447M610 476H690M610 507C650 542 675 532 710 505" fill="none" stroke="url(#candidate)" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="1345" y="405" width="160" height="78" rx="18" fill="#e0f7ef" stroke="#65c7a6" stroke-width="2"/>
  <text x="1425" y="450" class="pill" fill="#117b5d">Accept Candidates</text>
  <rect x="1345" y="535" width="160" height="78" rx="18" fill="#fff2dc" stroke="#efbe70" stroke-width="2"/>
  <text x="1425" y="580" class="pill" fill="#a6650e">VLA Fallback</text>
  <path d="M1265 455C1300 455 1310 444 1335 444" fill="none" stroke="#159a72" stroke-width="3" marker-end="url(#arrow-green)"/>
  <path d="M1265 497C1300 515 1310 574 1335 574" fill="none" stroke="#d98b18" stroke-width="3" marker-end="url(#arrow-amber)"/>
  <rect x="1030" y="565" width="255" height="58" rx="29" fill="#dff0ff"/>
  <text x="1157" y="600" class="pill" fill="#1e63b2">Safe Robot Action</text>
  <path d="M1425 483V520C1425 642 1295 642 1280 610" fill="none" stroke="#159a72" stroke-width="3" marker-end="url(#arrow-green)"/>
  <path d="M1345 574H1295" fill="none" stroke="#d98b18" stroke-width="3" marker-end="url(#arrow-amber)"/>
  <text x="530" y="584" class="small">KERV and additional policies share the same candidate / verifier / fallback boundary</text>
</svg>
